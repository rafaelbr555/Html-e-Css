<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias no HTML 5</title>
</head>
<body>
    <main>
        <h1>Imagens Dinamicas</h1>
        <p>Aqui vamos fazer uma imagem se adptar ao tamanho da tela.</p>
        <picture>
            <source media="(max-width: 750px)"srcset="imagens/foto-p.png" type="image/png">
            <source media="(max-width: 1050px)"srcset="imagens/foto-m.png" type="image/png">
            <img src="imagens/foto-g.png" alt="Imagem flexivel">
        </picture>
        <h1>Reproduzindo Audio"></audio></h1>
        <p>Eviction Silent Partner</p>
        <audio src="midias/Eviction-Silent-Partner.mp3" controls autoplay></audio>

    <video width=" 500px" controls autoplay> 
        <source src="videos/file.mp4" type="video/mp4">
    </video>
    </main>
    
</body>
</html>
