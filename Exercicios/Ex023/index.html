<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select, datalist e textarea</title>
</head>
<body>
<H1>Formulario</H1>
<form action="" method="post">
    <div>
        <label for="iest">Estados</label>
        <select name="estado" id="iest">
            <option value=""></option>
            <option value="TO">Tocantins</option>
            <option value="RS">Rio de Janeiro</option>
            <option value="SP">São Paulo</option>


        </select>
    </div>
    <div>
        <label for="imsg">Mensagem</label>
        <textarea name="mnesagem" id="imsg" cols="30" rows="10"></textarea>
    </div>


</form>
</body>
</html>
